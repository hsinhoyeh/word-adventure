<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Adventure! ✈️🚌🌊</title>
  <meta name="description" content="Learn English and Chinese words through fun themed puzzles! Free game for kids age 5–12. Three themes, bilingual EN / 繁中, voice reading." />

  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://hsinhoyeh.github.io/word-adventure/" />
  <meta property="og:title"       content="Word Adventure! 🌟 — Bilingual Word Puzzles for Kids" />
  <meta property="og:description" content="Learn English and Chinese words through fun themed puzzles! Free game for kids age 5–12. Three themes, bilingual EN / 繁中, voice reading." />
  <meta property="og:locale"      content="en_US" />
  <meta property="og:locale:alternate" content="zh_TW" />

  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="Word Adventure! 🌟 — Bilingual Word Puzzles for Kids" />
  <meta name="twitter:description" content="Learn English and Chinese words through fun themed puzzles! Free game for kids age 5–12. Three themes, bilingual EN / 繁中, voice reading." />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --amber:#f59e0b; --amber-light:#fffbeb; --green:#22c55e; --red:#ef4444; --orange:#f97316; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Nunito',system-ui,sans-serif; background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:12px; }
    body.zh { line-height:1.4; }

    .card { background:#fff; border-radius:28px; padding:28px 24px; max-width:580px; width:100%; box-shadow:0 25px 70px rgba(0,0,0,.35); position:relative; overflow:hidden; min-height:520px; }
    .screen { display:none; flex-direction:column; }
    .screen.active { display:flex; }

    /* ── lang switch ── */
    .lang-wrap { position:absolute; top:14px; right:18px; z-index:20; display:flex; align-items:center; gap:8px; }
    .lang-switch { display:flex; background:#f3f4f6; border-radius:999px; padding:3px; }
    .lang-btn { border:none; background:transparent; padding:5px 11px; border-radius:999px; font-weight:700; cursor:pointer; color:#374151; font-size:.82rem; font-family:inherit; transition:all .15s; }
    .lang-btn.active { background:var(--amber); color:#fff; }

    /* ── zhuyin ── */
    .zy { display:inline-flex; align-items:center; line-height:1; vertical-align:middle; }
    .zy-c { display:inline-block; }
    .zy-z { display:inline-flex; align-items:center; margin-left:1px; }
    .zy-z.zy-neu { flex-direction:column; align-items:center; }
    .zy-b { writing-mode:vertical-lr; text-orientation:upright; font-size:.38em; font-weight:700; color:#d84315; line-height:.92; letter-spacing:-.5px; user-select:none; }
    .zy-t { font-size:.32em; font-weight:700; color:#d84315; line-height:1; user-select:none; }
    .zy-neu .zy-t { margin-bottom:-1px; }

    /* ── ticker ── */
    .ticker { overflow:hidden; height:52px; position:relative; margin-bottom:10px; }
    .ticker-v { position:absolute; font-size:2.4rem; top:4px; animation:drive 5s linear infinite; }
    @keyframes drive { from{left:-80px} to{left:110%} }

    /* ── home ── */
    #s-home { padding-top:10px; }
    .home-title { font-size:2.2rem; font-weight:900; color:#1e1b4b; text-align:center; margin-bottom:4px; }
    .home-sub   { font-size:.95rem; color:#6b7280; text-align:center; margin-bottom:20px; }
    .label-row  { font-size:.9rem; font-weight:700; color:#4b5563; margin-bottom:10px; }
    .theme-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
    .theme-card { border-radius:18px; padding:16px 8px 12px; text-align:center; cursor:pointer; border:3px solid #e5e7eb; background:#f9fafb; transition:all .18s; user-select:none; }
    .theme-card:hover  { border-color:var(--amber); transform:translateY(-2px); }
    .theme-card.active { border-color:var(--amber); background:var(--amber-light); }
    .theme-card .big  { font-size:2.4rem; display:block; margin-bottom:6px; }
    .theme-card .name { font-size:.85rem; font-weight:800; color:#374151; }
    .diff-row { display:flex; gap:8px; margin-bottom:20px; }
    .diff-btn { flex:1; padding:10px 4px; border-radius:50px; border:2px solid #e5e7eb; background:#fff; font-family:inherit; font-size:.9rem; font-weight:700; cursor:pointer; transition:all .18s; }
    .diff-btn:hover  { border-color:var(--amber); }
    .diff-btn.active { background:var(--amber); color:#fff; border-color:var(--amber); }
    .name-input { width:100%; padding:13px 18px; border-radius:50px; border:2px solid #e5e7eb; font-family:inherit; font-size:1.05rem; font-weight:600; text-align:center; outline:none; margin-bottom:20px; transition:border-color .18s; }
    .name-input:focus { border-color:var(--amber); }
    .play-btn { width:100%; padding:17px; border-radius:50px; border:none; background:linear-gradient(135deg,#f59e0b,#d97706); color:#fff; font-family:inherit; font-size:1.25rem; font-weight:900; cursor:pointer; margin-bottom:12px; transition:all .18s; }
    .play-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(245,158,11,.45); }
    .text-link { text-align:center; color:var(--amber); font-size:.9rem; font-weight:700; cursor:pointer; }
    .text-link:hover { text-decoration:underline; }

    /* ── game ── */
    .game-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .score-label { font-size:1.1rem; font-weight:900; color:var(--amber); }
    .streak-badge { display:inline-block; background:#fef3c7; color:#b45309; border-radius:50px; padding:3px 10px; font-size:.8rem; font-weight:800; margin-top:3px; min-height:20px; }
    .q-counter { font-size:.9rem; font-weight:700; color:#6b7280; }
    .timer-wrap { position:relative; width:58px; height:58px; }
    .timer-svg  { transform:rotate(-90deg); }
    .t-bg   { fill:none; stroke:#f3f4f6; stroke-width:5; }
    .t-fill { fill:none; stroke:var(--amber); stroke-width:5; stroke-linecap:round; transition:stroke-dashoffset 1s linear,stroke .3s; }
    .t-fill.warn   { stroke:var(--orange); }
    .t-fill.danger { stroke:var(--red); }
    .timer-num { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:1.15rem; font-weight:900; color:#1f2937; }
    .timer-num.danger { color:var(--red); }
    .prog-wrap { background:#f3f4f6; border-radius:50px; height:8px; margin-bottom:18px; overflow:hidden; }
    .prog-bar  { height:100%; background:linear-gradient(90deg,var(--amber),#d97706); border-radius:50px; transition:width .4s ease; }

    /* scene box */
    .scene-box { border-radius:20px; padding:18px 16px; text-align:center; margin-bottom:16px; min-height:110px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; transition:background .3s; position:relative; }
    .scene-visuals { font-size:1.6rem; line-height:1.6; }
    .story-text    { font-size:1rem; font-weight:700; color:#1e3a5f; line-height:1.55; }
    .speak-btn { position:absolute; top:8px; right:10px; background:rgba(255,255,255,.85); border:1.5px solid #e5e7eb; border-radius:50%; width:34px; height:34px; font-size:.9rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
    .speak-btn:hover { background:#fff; border-color:var(--amber); }
    .speak-btn.speaking { animation:speakPulse .7s infinite; }
    @keyframes speakPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }

    .question-text { font-size:1.1rem; font-weight:800; color:#111827; text-align:center; margin-bottom:12px; line-height:1.5; }
    .ans-grid { display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-bottom:14px; }
    .ans-btn { padding:18px 12px; border-radius:18px; border:3px solid #e5e7eb; background:#fff; font-family:inherit; font-size:1.1rem; font-weight:900; cursor:pointer; transition:all .18s; color:#1f2937; word-break:break-word; }
    .ans-btn:hover:not(:disabled) { border-color:var(--amber); background:var(--amber-light); transform:scale(1.03); }
    .ans-btn.correct { border-color:var(--green); background:#dcfce7; color:#14532d; animation:popGreen .45s; }
    .ans-btn.wrong   { border-color:var(--red);   background:#fee2e2; color:#7f1d1d; animation:shake .4s; }
    .ans-btn:disabled { cursor:default; }
    .ans-btn.faded   { opacity:.28; }
    @keyframes popGreen { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }
    .hint-row { display:flex; justify-content:space-between; align-items:center; }
    .hint-info { font-size:.85rem; font-weight:700; color:#9ca3af; }
    .hint-btn  { background:#fff7ed; color:#c2410c; border:1.5px solid #fed7aa; padding:6px 14px; border-radius:50px; font-family:inherit; font-size:.82rem; font-weight:800; cursor:pointer; transition:all .15s; }
    .hint-btn:hover:not(:disabled) { background:#ffedd5; }
    .hint-btn:disabled { opacity:.4; cursor:default; }

    /* ── feedback overlay ── */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; z-index:200; padding:20px; }
    .overlay.active { display:flex; }
    .fb-box { background:#fff; border-radius:26px; padding:34px 28px; text-align:center; max-width:360px; width:100%; animation:popIn .3s; }
    @keyframes popIn { from{transform:scale(.72);opacity:0} to{transform:scale(1);opacity:1} }
    .fb-icon    { font-size:4rem; margin-bottom:10px; }
    .fb-word-en { font-size:2rem; font-weight:900; color:#1e1b4b; margin-bottom:4px; }
    .fb-word-zh { font-size:1.3rem; font-weight:800; color:#374151; margin-bottom:4px; }
    .fb-zhuyin  { font-size:1rem; color:#d84315; font-weight:700; margin-bottom:12px; letter-spacing:.05em; }
    .fb-expl    { font-size:.95rem; color:#4b5563; font-weight:600; line-height:1.55; margin-bottom:22px; }
    .next-btn { padding:14px 32px; border-radius:50px; border:none; font-family:inherit; font-size:1.05rem; font-weight:800; cursor:pointer; color:#fff; transition:all .18s; }
    .next-btn.ok { background:var(--green); }
    .next-btn.oh { background:var(--orange); }
    .next-btn:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,.2); }

    /* ── social share ── */
    .share-wrap { margin:14px 0 6px; text-align:center; }
    .share-label { font-size:.8rem; font-weight:700; color:#6b7280; text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; }
    .share-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .share-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:50px; border:none; font-family:inherit; font-size:.85rem; font-weight:800; cursor:pointer; text-decoration:none; color:#fff; transition:transform .15s,opacity .15s; }
    .share-btn:hover { opacity:.88; transform:scale(1.05); }
    .share-btn.sb-x    { background:#000; }
    .share-btn.sb-fb   { background:#1877f2; }
    .share-btn.sb-line { background:#00c300; }
    .share-btn.sb-wa   { background:#25d366; }

    /* ── results ── */
    .results-center { text-align:center; margin-bottom:22px; }
    .stars-row { font-size:3.2rem; margin-bottom:6px; }
    .final-pts { font-size:3.2rem; font-weight:900; color:var(--amber); }
    .final-sub { font-size:.9rem; color:#6b7280; font-weight:600; }
    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:22px; }
    .stat-box { background:#f9fafb; border-radius:16px; padding:16px 10px; text-align:center; }
    .stat-val { font-size:1.8rem; font-weight:900; color:#111827; }
    .stat-lbl { font-size:.78rem; font-weight:700; color:#9ca3af; margin-top:3px; }
    .btn-col  { display:flex; flex-direction:column; gap:10px; }
    .outline-btn { width:100%; padding:14px; border-radius:50px; border:2.5px solid var(--amber); background:#fff; color:var(--amber); font-family:inherit; font-size:1rem; font-weight:800; cursor:pointer; transition:all .18s; }
    .outline-btn:hover { background:var(--amber-light); }

    /* ── leaderboard ── */
    .lb-header { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
    .back-btn  { background:#f3f4f6; border:none; border-radius:50%; width:38px; height:38px; font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; }
    .back-btn:hover { background:#e5e7eb; }
    .lb-title { font-size:1.55rem; font-weight:900; color:#1e1b4b; }
    .lb-tabs { display:flex; gap:8px; margin-bottom:16px; }
    .lb-tab  { flex:1; padding:9px 4px; border-radius:50px; border:2px solid #e5e7eb; background:#fff; font-family:inherit; font-size:.85rem; font-weight:800; cursor:pointer; transition:all .15s; }
    .lb-tab:hover  { border-color:var(--amber); }
    .lb-tab.active { background:var(--amber); color:#fff; border-color:var(--amber); }
    .lb-list { list-style:none; max-height:340px; overflow-y:auto; }
    .lb-item { display:flex; align-items:center; gap:10px; padding:11px 14px; border-radius:14px; margin-bottom:7px; background:#f9fafb; }
    .lb-item.gold   { background:#fefce8; }
    .lb-item.silver { background:#f8fafc; }
    .lb-item.bronze { background:#fff7ed; }
    .lb-item.me     { outline:2.5px solid var(--amber); }
    .lb-rank { width:28px; font-size:1.1rem; font-weight:900; }
    .lb-name { flex:1; font-weight:800; font-size:.95rem; color:#1f2937; }
    .lb-theme { font-size:1.1rem; }
    .lb-pts  { font-weight:900; color:var(--amber); font-size:.95rem; }
    .lb-empty { text-align:center; color:#d1d5db; font-size:1rem; font-weight:700; padding:40px 0; }

    /* ── animations ── */
    .score-pop { position:absolute; font-size:1.6rem; font-weight:900; color:var(--green); pointer-events:none; animation:rise 1s ease-out forwards; z-index:100; }
    @keyframes rise { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-60px)} }
    .confetti { position:fixed; width:9px; height:9px; border-radius:2px; pointer-events:none; z-index:999; animation:fall linear forwards; }
    @keyframes fall { 0%{opacity:1;transform:translateY(-20px) rotate(0deg)} 100%{opacity:0;transform:translateY(100vh) rotate(720deg)} }

    @media (max-width:420px) {
      .card { padding:20px 16px; }
      .home-title { font-size:1.75rem; }
      .ans-btn { font-size:.95rem; padding:14px 8px; }
    }
  </style>
</head>
<body>
<div class="card" id="card">

  <!-- persistent lang switch -->
  <div class="lang-wrap">
    <div class="lang-switch">
      <button class="lang-btn" data-lang="en"    onclick="I18N.setLang('en')">EN</button>
      <button class="lang-btn" data-lang="zh-tw" onclick="I18N.setLang('zh-tw')">中文</button>
    </div>
  </div>

  <!-- HOME -->
  <div class="screen active" id="s-home">
    <div class="ticker"><span class="ticker-v" id="ticker-v">✈️</span></div>
    <h1 class="home-title" data-i18n="appTitle">🌟 Word Adventure!</h1>
    <p  class="home-sub"   data-i18n="subtitle">Fun word puzzles for young explorers ✨</p>
    <input class="name-input" id="name-input" placeholder="What's your name?" maxlength="20" autocomplete="off">
    <p class="label-row" data-i18n="chooseAdv">🗺️ Choose your adventure:</p>
    <div class="theme-grid">
      <div class="theme-card active" data-t="airline" onclick="pickTheme(this,'airline')">
        <span class="big">✈️</span><span class="name" data-i18n="thAirline">Airline</span>
      </div>
      <div class="theme-card" data-t="bus" onclick="pickTheme(this,'bus')">
        <span class="big">🚌</span><span class="name" data-i18n="thBus">Bus</span>
      </div>
      <div class="theme-card" data-t="ocean" onclick="pickTheme(this,'ocean')">
        <span class="big">🌊</span><span class="name" data-i18n="thOcean">Ocean</span>
      </div>
    </div>
    <p class="label-row" data-i18n="chooseDiff">🎯 Choose difficulty:</p>
    <div class="diff-row">
      <button class="diff-btn active" data-d="easy"   onclick="pickDiff(this,'easy')"   data-i18n="dEasy">🌱 Easy</button>
      <button class="diff-btn"        data-d="medium" onclick="pickDiff(this,'medium')" data-i18n="dMedium">⭐ Medium</button>
      <button class="diff-btn"        data-d="hard"   onclick="pickDiff(this,'hard')"   data-i18n="dHard">🔥 Hard</button>
    </div>
    <button class="play-btn" data-i18n="startBtn" onclick="startGame()">🚀 Start Adventure!</button>
    <span class="text-link" data-i18n="lbLink" onclick="openLB()">🏆 View Leaderboard</span>
  </div>

  <!-- GAME -->
  <div class="screen" id="s-game">
    <div class="game-header">
      <div>
        <div class="score-label" id="g-score">⭐ 0 pts</div>
        <div class="streak-badge" id="g-streak"></div>
      </div>
      <div class="q-counter" id="g-qnum">Q 1 / 5</div>
      <div class="timer-wrap">
        <svg class="timer-svg" viewBox="0 0 58 58" width="58" height="58">
          <circle class="t-bg"   cx="29" cy="29" r="24"/>
          <circle class="t-fill" cx="29" cy="29" r="24" id="t-arc" stroke-dasharray="150.8" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-num" id="t-num">45</div>
      </div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="g-prog" style="width:20%"></div></div>
    <div class="scene-box" id="g-scene">
      <button class="speak-btn" id="speak-btn" onclick="speakQ()" title="Read aloud">🔊</button>
      <div class="scene-visuals" id="g-visuals"></div>
      <div class="story-text"   id="g-story"></div>
    </div>
    <div class="question-text" id="g-question"></div>
    <div class="ans-grid">
      <button class="ans-btn" id="a0" onclick="pick(0)"></button>
      <button class="ans-btn" id="a1" onclick="pick(1)"></button>
      <button class="ans-btn" id="a2" onclick="pick(2)"></button>
      <button class="ans-btn" id="a3" onclick="pick(3)"></button>
    </div>
    <div class="hint-row">
      <span class="hint-info" id="g-hint-info"></span>
      <button class="hint-btn" id="g-hint-btn" data-i18n="hintBtn" onclick="useHint()">💡 50/50 Hint</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="s-results">
    <div class="results-center">
      <div class="stars-row" id="r-stars"></div>
      <div class="final-pts"  id="r-pts">0</div>
      <div class="final-sub"  id="r-sub" data-i18n="ptsSuffix">points earned!</div>
    </div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val" id="r-correct">0</div><div class="stat-lbl" data-i18n="statCorrect">Correct</div></div>
      <div class="stat-box"><div class="stat-val" id="r-acc">0%</div><div class="stat-lbl" data-i18n="statAcc">Accuracy</div></div>
      <div class="stat-box"><div class="stat-val" id="r-avg">0s</div><div class="stat-lbl" data-i18n="statTime">Avg Time</div></div>
      <div class="stat-box"><div class="stat-val" id="r-streak">0</div><div class="stat-lbl" data-i18n="statStreak">Best Streak</div></div>
    </div>
    <div class="share-wrap">
      <div class="share-label" data-i18n="shareLabel">Share your score</div>
      <div class="share-row" id="share-row"></div>
    </div>
    <div class="btn-col">
      <button class="play-btn"    data-i18n="playAgain"  onclick="startGame()">🔄 Play Again</button>
      <button class="outline-btn" data-i18n="changeSet"  onclick="show('home')">🏠 Change Settings</button>
      <span class="text-link" data-i18n="lbLink" onclick="openLB()" style="margin-top:4px">🏆 Leaderboard</span>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div class="screen" id="s-lb">
    <div class="lb-header">
      <button class="back-btn" onclick="show('home')">←</button>
      <span class="lb-title" data-i18n="lbTitle">🏆 Leaderboard</span>
    </div>
    <div class="lb-tabs">
      <button class="lb-tab active" data-i18n="dEasy"   onclick="lbTab(this,'easy')">🌱 Easy</button>
      <button class="lb-tab"        data-i18n="dMedium" onclick="lbTab(this,'medium')">⭐ Medium</button>
      <button class="lb-tab"        data-i18n="dHard"   onclick="lbTab(this,'hard')">🔥 Hard</button>
    </div>
    <ul class="lb-list" id="lb-list"></ul>
  </div>
</div>

<!-- FEEDBACK OVERLAY -->
<div class="overlay" id="overlay">
  <div class="fb-box">
    <div class="fb-icon"    id="fb-icon"></div>
    <div class="fb-word-en" id="fb-word-en"></div>
    <div class="fb-word-zh" id="fb-word-zh"></div>
    <div class="fb-zhuyin"  id="fb-zhuyin"></div>
    <div class="fb-expl"    id="fb-expl"></div>
    <button class="next-btn" id="fb-btn" onclick="nextQ()">Next →</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// ZH — Bopomofo annotator
// ════════════════════════════════════════════════════
(function () {
  const CHARS = {
    // ── code-quest-kids base ──

      i++;

    return out;

// SPEECH
// ════════════════════════════════════════════════════
function stripHtml(s){return s.replace(/<[^>]+>/g,"");}
function pickVoice(lang){
  const voices=window.speechSynthesis.getVoices();
  if(!voices.length)return null;
  const zh=lang==="zh-TW";
  const prefs=zh
    ?["Meijia","Tingting","zh-TW","zh_TW","Chinese (Traditional)"]
    :["Samantha","Karen","Moira","Daniel","en-US","en_US","English"];
  for(const p of prefs){
    const v=voices.find(v=>v.name.includes(p)||v.lang===p);
    if(v)return v;
  }
  return voices.find(v=>v.lang.startsWith(zh?"zh":"en"))||null;
}
function speak(text){
  if(!window.speechSynthesis||!text.trim())return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  const lang=I18N.lang==="zh-tw"?"zh-TW":"en-US";
  u.lang=lang;
  u.rate=0.9; u.pitch=1.0;
  const v=pickVoice(lang);
  if(v)u.voice=v;
  const btn=document.getElementById("speak-btn");
  if(btn)btn.classList.add("speaking");
  u.onend=u.onerror=()=>btn&&btn.classList.remove("speaking");
  window.speechSynthesis.speak(u);
}
function speakQ(){
  const q=GS.qs&&GS.qs[GS.qi];
  if(!q)return;
  const zh=I18N.lang==="zh-tw";
  const text=stripHtml(zh?q.s_zh:q.s_en).replace("___","blank");
  speak(text);
}

const r=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
function shuffle(a){
  const arr=[...a];
  for(let i=arr.length-1;i>0;i--){const j=r(0,i);[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

const BANKS={airline:QA,bus:QB,ocean:QO};

// ════════════════════════════════════════════════════
// BUILD QUESTIONS
// ════════════════════════════════════════════════════
function buildQuestions(theme,diff){
  const bank=BANKS[theme][diff];
  const shuffled=shuffle(bank).slice(0,TOTAL);
  return shuffled.map(q=>{
    const opts_en=shuffle([q.word_en,...q.dist_en]);
    const opts_zh=shuffle([q.word_zh,...q.dist_zh]);
    return Object.assign({},q,{opts_en,opts_zh});
  });
}

// ════════════════════════════════════════════════════
// GAME
// ════════════════════════════════════════════════════
function startGame(){
  const nm=document.getElementById("name-input").value.trim();
  if(!nm){
    const inp=document.getElementById("name-input");
    inp.style.borderColor="#ef4444";
    inp.placeholder=I18N.t("noName");
    setTimeout(()=>{inp.style.borderColor="";inp.placeholder=I18N.t("namePH");},2000);
    return;
  }
  Object.assign(GS,{name:nm,qs:buildQuestions(GS.theme,GS.diff),qi:0,score:0,streak:0,best:0,hints:2,correct:0,timeSum:0,answered:false});
  show("game");
  loadQ();
}

function loadQ(){
  if(GS.qi>=TOTAL){endGame();return;}
  const q=GS.qs[GS.qi];
  const th=THEMES[GS.theme];
  GS.answered=false;
  GS._qStart=Date.now();
  const zh=I18N.lang==="zh-tw";

  // header
  document.getElementById("g-score").textContent=`⭐ ${GS.score} ${I18N.t("ptsLabel")}`;
  document.getElementById("g-qnum").textContent=`Q ${GS.qi+1} / ${TOTAL}`;
  document.getElementById("g-prog").style.width=`${((GS.qi+1)/TOTAL)*100}%`;
  updStreak();

  // scene
  document.getElementById("g-scene").style.background=th.bg;
  document.getElementById("g-visuals").textContent=q.emoji;
  document.getElementById("g-story").innerHTML=zh?ZH.annotate(q.s_zh):q.s_en;
  document.getElementById("g-question").innerHTML="❓ "+(zh?ZH.annotate(I18N.t("qPrompt")):I18N.t("qPrompt"));

  // answers
  for(let i=0;i<4;i++){
    const b=document.getElementById("a"+i);
    b.textContent=zh?q.opts_zh[i]:q.opts_en[i];
    b.setAttribute("data-val",zh?q.opts_zh[i]:q.opts_en[i]);
    b.className="ans-btn";b.disabled=false;b.style.opacity="";
  }

  updHint();
  tickStart(DIFFS[GS.diff].secs);
  setTimeout(speakQ,350);
}

function pick(i){
  if(GS.answered)return;
  GS.answered=true;
  window.speechSynthesis&&window.speechSynthesis.cancel();
  clearInterval(GS.timer);

  const q=GS.qs[GS.qi];
  const zh=I18N.lang==="zh-tw";
  const selected=document.getElementById("a"+i).getAttribute("data-val");
  const correct=zh?q.word_zh:q.word_en;
  const ok=selected===correct;

  const secs=Math.round((Date.now()-GS._qStart)/1000);
  const max=DIFFS[GS.diff].secs;
  GS.timeSum+=Math.min(secs,max);

  // highlight all buttons
  for(let k=0;k<4;k++){
    const b=document.getElementById("a"+k);
    b.disabled=true;
    const bVal=b.getAttribute("data-val");
    if(bVal===correct)b.classList.add("correct");
  }
  if(!ok)document.getElementById("a"+i).classList.add("wrong");

  let pts=0;
  if(ok){
    pts=10;if(secs<=max/2)pts+=3;
    GS.streak++;if(GS.streak>GS.best)GS.best=GS.streak;if(GS.streak>=3)pts+=2;
    GS.score+=pts;GS.correct++;
    popScore(`+${pts}`);
  }else{GS.streak=0;}
  GS.answers=(GS.answers||[]).concat({ok,secs});
  setTimeout(()=>showFB(ok,q,pts),550);
}

function timeUp(){
  if(GS.answered)return;
  GS.answered=true;
  window.speechSynthesis&&window.speechSynthesis.cancel();
  const q=GS.qs[GS.qi];
  GS.streak=0;
  const zh=I18N.lang==="zh-tw";
  const correct=zh?q.word_zh:q.word_en;
  for(let k=0;k<4;k++){
    const b=document.getElementById("a"+k);b.disabled=true;
    if(b.getAttribute("data-val")===correct)b.classList.add("correct");
  }
  GS.timeSum+=DIFFS[GS.diff].secs;
  showFB(false,q,0,true);
}

function useHint(){
  if(GS.hints<=0||GS.answered)return;
  GS.hints--;updHint();
  const q=GS.qs[GS.qi];
  const zh=I18N.lang==="zh-tw";
  const correct=zh?q.word_zh:q.word_en;
  const wrongs=[];
  for(let i=0;i<4;i++){
    const b=document.getElementById("a"+i);
    if(b.getAttribute("data-val")!==correct&&!b.disabled)wrongs.push(i);
  }
  shuffle(wrongs).slice(0,2).forEach(i=>{
    const b=document.getElementById("a"+i);b.disabled=true;b.classList.add("faded");
  });
}

const CHEERS_EN=["Great job! 🎉","Awesome! 🌟","Correct! 💪","Brilliant! 🧠","You got it! 🎯","Spot on! ✨"];
const CHEERS_ZH=["太棒了！🎉","好厲害！🌟","答對了！💪","超聰明！🧠","就是這樣！🎯","完全正確！✨"];

function showFB(ok,q,pts,timeout){
  timeout=timeout||false;
  const zh=I18N.lang==="zh-tw";
  const cheers=zh?CHEERS_ZH:CHEERS_EN;
  document.getElementById("fb-icon").textContent=ok?"✅":(timeout?"⏰":"❌");

  // word display
  document.getElementById("fb-word-en").textContent=q.word_en.toUpperCase();
  document.getElementById("fb-word-zh").textContent=q.word_zh;
  document.getElementById("fb-zhuyin").textContent=q.word_zhuyin;

  // explanation
  const expl=zh?q.e_zh:q.e_en;
  document.getElementById("fb-expl").innerHTML=zh?ZH.annotate(expl):expl;

  const more=GS.qi+1<TOTAL;
  const btn=document.getElementById("fb-btn");
  btn.textContent=!more?I18N.t("seeResults"):(ok?I18N.t("keepGoing"):I18N.t("understand"));
  btn.className=`next-btn ${ok?"ok":"oh"}`;
  document.getElementById("overlay").classList.add("active");

  // speak English word
  setTimeout(()=>speak(q.word_en),400);
}

function nextQ(){
  document.getElementById("overlay").classList.remove("active");
  GS.qi++;loadQ();
}

function updStreak(){
  const zh=I18N.lang==="zh-tw";
  document.getElementById("g-streak").textContent=GS.streak>=3
    ?(zh?`🔥 連勝 ${GS.streak} 次！`:`🔥 ${GS.streak} Streak!`):"";
}
function updHint(){
  const n=GS.hints,zh=I18N.lang==="zh-tw";
  document.getElementById("g-hint-info").textContent=zh?`💡 剩 ${n} 個提示`:`💡 ${n} hint${n!==1?"s":""} left`;
  document.getElementById("g-hint-btn").disabled=n===0;
}

function popScore(txt){
  const el=document.createElement("div");el.className="score-pop";el.textContent=txt;
  el.style.left=r(20,70)+"%";el.style.top=r(30,50)+"%";
  document.getElementById("card").appendChild(el);setTimeout(()=>el.remove(),1000);
}

// ════════════════════════════════════════════════════
// END GAME
// ════════════════════════════════════════════════════
function endGame(){
  clearInterval(GS.timer);saveScore();
  const acc=Math.round((GS.correct/TOTAL)*100);
  const avg=GS.timeSum>0?Math.round(GS.timeSum/TOTAL):0;
  const stars=acc>=90?"⭐⭐⭐":acc>=70?"⭐⭐":"⭐";
  const zh=I18N.lang==="zh-tw";
  document.getElementById("r-stars").textContent=stars;
  document.getElementById("r-pts").textContent=GS.score;
  document.getElementById("r-correct").textContent=`${GS.correct}/${TOTAL}`;
  document.getElementById("r-acc").textContent=`${acc}%`;
  document.getElementById("r-avg").textContent=`${avg}s`;
  document.getElementById("r-streak").textContent=GS.best;
  show("results");
  buildShareRow(GS.score,GS.diff);
  if(acc>=90)setTimeout(confetti,350);
  const msg=acc>=90?(zh?"你太厲害了！所有單字都答對！":"Perfect score! You know all the words!")
    :acc>=70?(zh?"做得很好！":"Well done!")
    :(zh?"繼續學習，加油！":"Keep learning, you can do it!");
  setTimeout(()=>speak(msg),400);
}

function buildShareRow(score,diff){
  const url="https://hsinhoyeh.github.io/word-adventure/";
  const diffLabel=I18N.t("d"+diff.charAt(0).toUpperCase()+diff.slice(1)).replace(/^[^\w]/,"").trim();
  const text=I18N.t("shareTpl").replace("{score}",score).replace("{diff}",diffLabel);
  const enc=encodeURIComponent(text+" "+url);
  const encUrl=encodeURIComponent(url);
  const links=[
    {cls:"sb-x",    icon:"𝕏", label:"X",        href:`https://twitter.com/intent/tweet?text=${enc}`},
    {cls:"sb-fb",   icon:"f", label:"Facebook",  href:`https://www.facebook.com/sharer/sharer.php?u=${encUrl}&quote=${encodeURIComponent(text)}`},
    {cls:"sb-line", icon:"L", label:"LINE",       href:`https://line.me/R/msg/text/?${enc}`},
    {cls:"sb-wa",   icon:"W", label:"WhatsApp",   href:`https://wa.me/?text=${enc}`},
  ];
  document.getElementById("share-row").innerHTML=links.map(l=>
    `<a class="share-btn ${l.cls}" href="${l.href}" target="_blank" rel="noopener">${l.icon} ${l.label}</a>`
  ).join("");
}

// ════════════════════════════════════════════════════
// LEADERBOARD
// ════════════════════════════════════════════════════
function saveScore(){
  const key=`wa_lb_${GS.diff}`;
  const entry={name:GS.name,score:GS.score,theme:GS.theme,acc:Math.round((GS.correct/TOTAL)*100)};
  let board=JSON.parse(localStorage.getItem(key)||"[]");
  board.push(entry);board.sort((a,b)=>b.score-a.score);board=board.slice(0,10);
  localStorage.setItem(key,JSON.stringify(board));
}

function openLB(){show("lb");lbTab(document.querySelector(".lb-tab"),"easy");}

function lbTab(el,diff){
  document.querySelectorAll(".lb-tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  const board=JSON.parse(localStorage.getItem(`wa_lb_${diff}`)||"[]");
  const list=document.getElementById("lb-list");
  if(!board.length){list.innerHTML=`<li class="lb-empty">${I18N.t("lbEmpty")}</li>`;return;}
  const medals=["🥇","🥈","🥉"],cls=["gold","silver","bronze"];
  list.innerHTML=board.map((e,i)=>`
    <li class="lb-item ${cls[i]||""} ${e.name===GS.name?"me":""}">
      <span class="lb-rank">${medals[i]||(i+1)+"."}</span>
      <span class="lb-name">${ZH.esc(e.name)}</span>
      <span class="lb-theme">${THEMES[e.theme]?THEMES[e.theme].emoji:""}</span>
      <span class="lb-pts">${e.score} ${I18N.t("ptsLabel")}</span>
    </li>`).join("");
}

// ════════════════════════════════════════════════════
// TIMER
// ════════════════════════════════════════════════════
function tickStart(secs){
  clearInterval(GS.timer);GS.t=secs;
  const arc=document.getElementById("t-arc"),num=document.getElementById("t-num");
  const circ=2*Math.PI*24;
  function tick(){
    num.textContent=GS.t;
    arc.style.strokeDashoffset=circ*(1-GS.t/secs);
    arc.className="t-fill "+(GS.t<=secs*.25?"danger":GS.t<=secs*.5?"warn":"");
    num.className="timer-num "+(GS.t<=secs*.25?"danger":"");
  }
  tick();
  GS.timer=setInterval(()=>{GS.t--;tick();if(GS.t<=0){clearInterval(GS.timer);timeUp();}},1000);
}

// ════════════════════════════════════════════════════
// UI
// ════════════════════════════════════════════════════
function show(name){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("s-"+name).classList.add("active");
  window.speechSynthesis&&window.speechSynthesis.cancel();
}
function pickTheme(el,t){
  GS.theme=t;
  document.querySelectorAll(".theme-card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
}
function pickDiff(el,d){
  GS.diff=d;
  document.querySelectorAll(".diff-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

// ════════════════════════════════════════════════════
// CONFETTI
// ════════════════════════════════════════════════════
function confetti(){
  const cols=["#f59e0b","#f97316","#22c55e","#38bdf8","#f43f5e","#fbbf24","#a855f7"];
  for(let i=0;i<70;i++)setTimeout(()=>{
    const el=document.createElement("div");el.className="confetti";
    el.style.background=cols[r(0,cols.length-1)];el.style.left=r(0,100)+"vw";el.style.top="-20px";
    el.style.animationDuration=(1+Math.random()*1.2)+"s";el.style.animationDelay=(Math.random()*.6)+"s";
    document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
  },i*25);
}

// HOME TICKER — cycles ✈️ → 🚌 → 🌊 every 2 seconds
// ════════════════════════════════════════════════════
const TICKER_EMOJIS=["✈️","🚌","🌊"];
let _tickerIdx=0;

// ════════════════════════════════════════════════════
// I18N live-update on language change
// ════════════════════════════════════════════════════
I18N.onChange(lang=>{
  if(document.getElementById("s-game").classList.contains("active")&&GS.qs[GS.qi]&&!GS.answered){
    const q=GS.qs[GS.qi];const zh=lang==="zh-tw";
    document.getElementById("g-story").innerHTML=zh?ZH.annotate(q.s_zh):q.s_en;
    document.getElementById("g-question").innerHTML="❓ "+(zh?ZH.annotate(I18N.t("qPrompt")):I18N.t("qPrompt"));
    // refresh button text
    for(let i=0;i<4;i++){
      const b=document.getElementById("a"+i);
      b.textContent=zh?q.opts_zh[i]:q.opts_en[i];
      b.setAttribute("data-val",zh?q.opts_zh[i]:q.opts_en[i]);
    }
  }
  document.getElementById("g-score").textContent=`⭐ ${GS.score} ${I18N.t("ptsLabel")}`;
  updHint();updStreak();
});
